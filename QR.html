<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; img-src 'self' data: blob: https:; style-src 'self' https://cdn.jsdelivr.net https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com https://cdn.jsdelivr.net; script-src 'self' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://cdn.tailwindcss.com https://unpkg.com https://debq2.debmedia.com; connect-src 'self' https: wss:; frame-src 'self' https:; worker-src 'self' blob:; media-src 'self' data: blob: https:; form-action 'self' https:;">
  <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta name="referrer" content="strict-origin">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Numia Bank - QR</title>
  <link rel="icon" type="image/png" href="images/N.png" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"/ integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHSWRr1XeTyhezb4abCG4ccI5AkVDxqC+" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/css/totem/common.css" />
  <link rel="stylesheet" href="assets/css/totem/qr.css" />
</head>
<body>
  <script src="auth-portal.js" integrity="sha384-74EWFvH2m+aMjmQBpBiZyYeyAqC6jGuHtfv/vSH++XsVRcNEOWeyMNyLNP0p/rG1" crossorigin="anonymous"></script>
  <script src="assets/js/totem/auth-portal-init.js" integrity="sha384-qtXa0BOCcvU3oXrTG9qhBBFxjJy25O1tc6Q811yuP0DPD91J5JPXk5XXYVuc2uzh" crossorigin="anonymous"></script>
  <!-- Contenedor del tótem -->
  <div class="totem-container">
    <!-- Header -->
    <div class="totem-header">
      <img src="images/logonumia.png" alt="Numia Bank" class="totem-header-image">
    </div>
    
    <!-- Contenido del tótem -->
    <div class="totem-content">
      <!-- Pantalla 1: Formulario (Nombre, Apellido, DNI, Email) -->
      <div class="screen-form" id="screenForm">
        <h1>Bienvenido</h1>
        <div class="instruction">Complete sus datos para continuar</div>
        
        <form id="formDatos" novalidate>
          <div class="form-group">
            <label for="inputNombre">Nombre</label>
            <input type="text" id="inputNombre" name="nombre" placeholder="Ingrese su nombre" required>
            <div class="form-error is-hidden" id="errorNombre"></div>
          </div>
          <div class="form-group">
            <label for="inputApellido">Apellido</label>
            <input type="text" id="inputApellido" name="apellido" placeholder="Ingrese su apellido" required>
            <div class="form-error is-hidden" id="errorApellido"></div>
          </div>
          <div class="form-group">
            <label for="inputDni">DNI</label>
            <input type="text" id="inputDni" name="dni" placeholder="Ingrese su DNI" required>
            <div class="form-error is-hidden" id="errorDni"></div>
          </div>
          <div class="form-group">
            <label for="inputEmail">Email</label>
            <input type="email" id="inputEmail" name="email" placeholder="Ingrese su email" required>
            <div class="form-error is-hidden" id="errorEmail"></div>
          </div>
          <button type="submit" class="btn-continuar-form" id="btnContinuarForm">Continuar</button>
        </form>
      </div>
      
      <!-- Pantalla 2: Opciones de atención -->
      <div class="screen-opciones" id="screenOpciones">
        <h2>Seleccione su preferencia</h2>
        <div class="subtitle">Elija cómo desea ser atendido</div>
        
        <div class="opciones-grid" id="opcionesGrid">
          <!-- Se llenará dinámicamente -->
        </div>
      </div>
      
      <!-- Pantalla 3: Confirmación -->
      <div class="screen-confirmacion" id="screenConfirmacion">
        <div class="success-icon">
          <i class="bi bi-check-circle-fill"></i>
        </div>
        <h2>¡Atención solicitada!</h2>
        <div class="message">
          En breve uno de nuestros asesores lo atenderá.<br>
          Por favor, manténgase en línea.
        </div>
        
        <div class="tiempo-espera is-hidden" id="tiempoEspera">
          <div class="tiempo-espera-label">Tiempo de espera estimado</div>
          <div class="tiempo-espera-valor" id="tiempoEsperaValor">--</div>
        </div>
        
        <div class="video-link-container is-hidden" id="videoLinkContainer">
          <a href="#" id="btnVideoLink" class="btn-video" target="_blank" rel="noopener noreferrer">
            <i class="bi bi-camera-video me-2"></i>Iniciar Videollamada
          </a>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Contenedor de Logs a la derecha -->
  <div class="log-container">
    <div class="log-header">
      Análisis del Agente
    </div>
    <div class="log-content">
      <div id="atencionSection" class="atencion-section">
        <div id="stepsContainer" class="steps-container">
          <!-- Los pasos se agregarán aquí dinámicamente -->
        </div>
        
        <div id="summarySection" class="summary-section is-hidden">
          <div class="summary-title">
            <i class="bi bi-check-circle-fill"></i>
            Resumen del Análisis
          </div>
          <div id="summaryContent" class="summary-content"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script src="assets/js/shared/api-client.js" integrity="sha384-b/p40FT/5XXkNy7YC6XbaXRp1igzcpWmGB1YAGJzJJBvqKuwOpLgWb6MhHHM06wI" crossorigin="anonymous"></script>
  <script src="assets/js/shared/journey-api.js" integrity="sha384-Xb8m/gvtKBnY8JsY7/KQ98EAH5m+DN6AUdnZCr3lYNGL0p1ganb2J5NIXpp30dm1" crossorigin="anonymous"></script>
  <script src="assets/js/shared/fila-virtual-api.js" integrity="sha384-W2FVZuoQ/r9cqrSpNbk0wehzKOCRZCRnNfimodwlQaOJldMVGjdfZJjBqhzJxZuF" crossorigin="anonymous"></script>
  <script src="assets/js/totem/qr.js" integrity="sha384-OqkzkmyImHJojjNdECWKnnSQWjSS6rTrHUb7cDed7eKRMEE1qjLmHttwT1MQ6b0s" crossorigin="anonymous"></script>
</body>
</html>
