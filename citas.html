<body class="d-flex flex-column min-vh-100">

  <!-- Sección selector de sitio -->

    <div class="container">
      <p class="site-selector-text mb-0">Estas en el sitio de</p>
      <div class="site-buttons">
        <a href="#" class="site-btn active">
          <i class="bi bi-person-circle"></i>
          <span>Trabajadores</span>
        </a>
        <a href="#" class="site-btn">
          <i class="bi bi-person-circle"></i>
          <span>Pensionados</span>
        </a>
        <a href="#" class="site-btn">
          <i class="bi bi-building"></i>
          <span>Empresas</span>
        </a>
        <a href="#" class="site-btn">
          <i class="bi bi-info-circle"></i>
          <span>Sobre Nosotros</span>
        </a>
      </div>
    </div>
  </div>

  <!-- Barra de navegación principal -->
  <nav class="navbar araucana-navbar mb-3">
    <div class="container">
      <a href="index.html" class="navbar-brand d-flex align-items-center gap-2 text-decoration-none">
        <img src="images/Araucana.png" alt="La Araucana" />

      <div class="navbar-nav">
        <a href="#" class="nav-link">Licencias Médicas <i class="bi bi-chevron-down"></i></a>

      </div>

  <!-- ===== SECCIÓN DE CITAS ===== -->
  <div class="container py-4">
    <div class="row justify-content-center">
      <div class="col-lg-10">
        <div class="card shadow-sm border-0 cita-card">
          <div class="card-header bg-white border-bottom cita-card-header">
            <h4 class="mb-0"><i class="bi bi-calendar2-week me-2"></i>Agenda tu cita</h4>
          </div>
          <div class="card-body">
            <div id="citaAlert" class="alert d-none"></div>

            <div class="cita-toolbar">
              <div class="row g-3 align-items-end">
                <div class="col-lg-4">
                  <label class="form-label fw-semibold">Servicio / Agenda</label>
                  <select id="citaSchedule" class="form-select">
                    <option value="">Cargando...</option>
                  </select>
                </div>
                <div class="col-lg-4">
                  <label class="form-label fw-semibold">Sucursal</label>
                  <select id="citaBranch" class="form-select" disabled>
                    <option value="">Selecciona un servicio</option>
                  </select>
                </div>
                <div class="col-lg-4">
                  <label class="form-label fw-semibold">Fecha</label>
                  <div class="d-flex gap-2">
                    <input id="citaFecha" type="date" class="form-control" disabled/>
                  </div>
                </div>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Horarios disponibles</label>
              <div id="citaSlots"></div>
            </div>

            <hr class="my-3">

            <div class="row g-3">
              <div class="col-md-6"><label class="form-label fw-semibold">Nombre</label><input id="citaFirst" class="form-control" placeholder="Nombre"></div>
              <div class="col-md-6"><label class="form-label fw-semibold">Apellido</label><input id="citaLast" class="form-control" placeholder="Apellido"></div>
              <div class="col-md-6"><label class="form-label fw-semibold">RUT</label><input id="citaRut" class="form-control" placeholder="12.345.678-9"></div>
              <div class="col-md-6"><label class="form-label fw-semibold">Email</label><input id="citaMail" type="email" class="form-control" placeholder="correo@dominio.com"></div>
            </div>
          </div>
          <div class="card-footer bg-white border-top d-flex justify-content-between align-items-center cita-card-footer">
            <div class="cita-legend">Selecciona un horario para habilitar la confirmación.</div>
            <button id="citaConfirmar" class="btn cita-confirm-btn" disabled>Confirmar cita</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

  <script src="assets/js/shared/debmedia-api.js" integrity="sha384-e9oSnKuGgXBcmVjm05j+XJITuSHKtIT1aN4NvLIf7P3B7C7az/0GFI6Tun1q3yua" crossorigin="anonymous"></script>
    <script src="assets/js/pages/citas.js" integrity="sha384-kA07/eSXuoxf2CME+W2qnyln4yHSXZOeNZbUHbFk+gZVLO93yvCwjLc4qor79r5e" crossorigin="anonymous"></script>
